{% extends "base.html" %}
{% block title %}Sign in{% endblock %}

{% block content %}
<div class="auth-shell container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="glass-card auth-card">
                <p class="eyebrow mb-2">Welcome back</p>
                <h1 class="h3 fw-bold mb-1" style="font-family: var(--font-display);">Sign in</h1>
                <p class="text-secondary mb-4">Access your saved predictions and default profile.</p>
                <form method="post" action="{{ url_for('signin') }}" class="auth-form">
                    <input type="hidden" name="next" value="{{ next_url or '' }}">
                    <div class="mb-3">
                        <label class="form-label fw-medium" for="email">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required autocomplete="email" value="{{ form_email or '' }}" placeholder="you@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium" for="password">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password" placeholder="Your password">
                    </div>
                    <button type="submit" class="btn btn-predict btn-lg w-100">Sign in</button>
                </form>
                <p class="text-center text-secondary small mt-4 mb-0">
                    New here? <a class="auth-link" href="{{ url_for('signup') }}">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
