{% extends "base.html" %}
{% block title %}Create account{% endblock %}

{% block content %}
<div class="auth-shell container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="glass-card auth-card">
                <p class="eyebrow mb-2">New user</p>
                <h1 class="h3 fw-bold mb-1" style="font-family: var(--font-display);">Create your account</h1>
                <p class="text-secondary mb-4">Save prediction runs, store a default profile, and open your dashboard anytime.</p>
                <form method="post" action="{{ url_for('signup') }}" class="auth-form">
                    <div class="mb-3">
                        <label class="form-label fw-medium" for="full_name">Full name <span class="text-secondary fw-normal">(optional)</span></label>
                        <input type="text" class="form-control form-control-lg" id="full_name" name="full_name" autocomplete="name" value="{{ form_full_name or '' }}" maxlength="120" placeholder="e.g. Aarav Patil">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium" for="email">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required autocomplete="email" value="{{ form_email or '' }}" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium" for="password">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium" for="confirm_password">Confirm password</label>
                        <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" required autocomplete="new-password" minlength="8" placeholder="Repeat password">
                    </div>
                    <button type="submit" class="btn btn-predict btn-lg w-100">Create account</button>
                </form>
                <p class="text-center text-secondary small mt-4 mb-0">
                    Already have an account? <a class="auth-link" href="{{ url_for('signin') }}">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
